name: Refresh market snapshot

on:
  schedule:
    # Weekdays 22:00 UTC (~after US cash close, varies with DST)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional space-separated tickers (leave empty for full universe)"
        required: false
        default: ""

concurrency:
  group: refresh-market-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: services/scanner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/scanner/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh job
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GHA_REFRESH_TICKERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tickers || '' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${GHA_REFRESH_TICKERS:-}" ]; then
            # Word-split on whitespace: "AAPL MSFT" -> multiple argv after --tickers
            python run_refresh.py --tickers ${GHA_REFRESH_TICKERS}
          else
            python run_refresh.py
          fi
