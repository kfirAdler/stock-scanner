# Full-universe runs still pull full history from Supabase per ticker each time.
# Stooq/yfinance are only called when start<=today; after today’s bar exists, HTTP
# load drops, but DB work stays high. If a run exceeds 15 minutes, the next run
# queues (concurrency) instead of overlapping—reduces 429 risk vs parallel runs.
name: Refresh market snapshot

on:
  schedule:
    # US equity regular session (~09:30–16:00 America/New_York) in UTC:
    # EDT ≈ 13:30–20:00 UTC, EST ≈ 14:30–21:00 UTC. These three lines run every
    # 15 minutes across that band (some slots sit just outside RTH at DST edges).
    - cron: "30,45 13 * * 1-5"
    - cron: "*/15 14-20 * * 1-5"
    - cron: "0,15,30,45 21 * * 1-5"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional space-separated tickers (leave empty for full universe)"
        required: false
        default: ""
      universe:
        description: "When tickers empty — all (S&P 500 + TA-125), us, or ta"
        type: choice
        options:
          - all
          - us
          - ta
        default: all

concurrency:
  group: refresh-market-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: services/scanner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/scanner/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh job
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GHA_REFRESH_TICKERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tickers || '' }}
          GHA_REFRESH_UNIVERSE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.universe || 'all' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${GHA_REFRESH_TICKERS:-}" ]; then
            # Word-split on whitespace: "AAPL MSFT" -> multiple argv after --tickers
            python run_refresh.py --tickers ${GHA_REFRESH_TICKERS}
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            python run_refresh.py --universe "${GHA_REFRESH_UNIVERSE:-all}"
          else
            python run_refresh.py
          fi
